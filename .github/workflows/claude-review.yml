# Claude Code Review Workflow
# This workflow provides AI-assisted code review on pull requests
# 
# SETUP REQUIRED:
# 1. Set ANTHROPIC_API_KEY in repository secrets
# 2. Adjust the triggers and paths as needed
#
# NOTE: This is a template. For production use, consider:
# - Using a dedicated service account
# - Rate limiting for large PRs
# - Caching for repeated reviews

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.go'
      - '**.jsx'
      - '**.tsx'

  # Manual trigger for re-review
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

# Ensure only one review runs per PR at a time
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    
    # Don't run on draft PRs unless manually triggered
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      
      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER=${{ github.event.inputs.pr_number }}
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi
          
          # Get list of changed files
          gh pr diff $PR_NUMBER --name-only > changed_files.txt
          
          # Filter to supported file types
          grep -E '\.(py|js|ts|go|jsx|tsx)$' changed_files.txt > review_files.txt || true
          
          # Count files
          FILE_COUNT=$(wc -l < review_files.txt | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Skip if no reviewable files
        if: steps.changed.outputs.file_count == '0'
        run: echo "No files to review. Skipping."
      
      - name: Run Claude Code Review
        if: steps.changed.outputs.file_count != '0'
        id: review
        run: |
          # Create review prompt
          cat > review_prompt.md << 'EOF'
          Review the following pull request changes. Focus on:
          
          1. **Correctness**: Logic errors, edge cases, null handling
          2. **Security**: Input validation, injection risks, auth issues
          3. **Performance**: N+1 queries, unnecessary iterations
          4. **Maintainability**: Code clarity, naming, documentation
          5. **Testing**: Are new features adequately tested?
          
          Provide feedback in this format:
          
          ## Summary
          [One paragraph overview]
          
          ## Issues Found
          ### 🔴 Critical (must fix)
          - [Issue with file:line reference]
          
          ### 🟡 Suggestions (should consider)
          - [Suggestion with file:line reference]
          
          ## What's Good
          - [Positive observations]
          
          ## Verdict
          [ ] ✅ Approve - Ready to merge
          [ ] ⚠️ Approve with suggestions - Minor improvements recommended  
          [ ] 🔄 Request changes - Issues need addressing
          
          EOF
          
          # Add diff to prompt
          echo "## Changes to Review" >> review_prompt.md
          echo '```diff' >> review_prompt.md
          gh pr diff ${{ steps.changed.outputs.pr_number }} >> review_prompt.md
          echo '```' >> review_prompt.md
          
          # Run Claude Code in print mode
          claude -p "$(cat review_prompt.md)" > review_output.md 2>&1 || true
          
          # Save output for next step
          echo "review_complete=true" >> $GITHUB_OUTPUT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post review comment
        if: steps.review.outputs.review_complete == 'true'
        run: |
          # Add header to review
          echo "## 🤖 Claude Code Review" > comment.md
          echo "" >> comment.md
          cat review_output.md >> comment.md
          echo "" >> comment.md
          echo "---" >> comment.md
          echo "*Automated review by Claude Code. Please verify suggestions before applying.*" >> comment.md
          
          # Post as PR comment
          gh pr comment ${{ steps.changed.outputs.pr_number }} --body-file comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload review artifact
        if: steps.review.outputs.review_complete == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-${{ steps.changed.outputs.pr_number }}
          path: review_output.md
          retention-days: 30

  # Optional: Security scan job
  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run pip-audit (Python)
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          pip install pip-audit
          pip-audit --desc || true
      
      - name: Run npm audit (JavaScript)
        if: hashFiles('package.json') != ''
        run: npm audit --audit-level=moderate || true
      
      - name: Run gosec (Go)
        if: hashFiles('go.mod') != ''
        uses: securego/gosec@master
        with:
          args: ./...
        continue-on-error: true
